<!DOCTYPE html>
<html>
<head>
    <title>Foodie</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<header>
    <h1>🍔 Foodie</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Menu</a>
        <a href="#">Offers</a>
        <a href="#">Contact</a>
    </nav>
</header>

<!-- Hero Section with Slider -->
<section class="hero">
    <div class="slides">
        <img src="food1.jpg" class="slide">
        <img src="food2.jpg" class="slide">
        <img src="food3.jpg" class="slide">
    </div>

    <div class="content">
        <h2>Delicious Food Delivered To You</h2>
        <p>Order your favorite meals anytime 🍕</p>
        <button>Order Now</button>
    </div>
</section>

<!-- Categories -->
<section class="categories">
    <h2>Categories</h2>
    <div class="cards">
        <div class="card">🍕 Pizza</div>
        <div class="card">🍔 Burger</div>
        <div class="card">🍛 Meals</div>
        <div class="card">🍰 Desserts</div>
    </div>
</section>

<!-- Popular Dishes -->
<section class="foods">
    <h2>Popular Dishes</h2>
    <div class="food-container">
        <div class="food-card">
            <img src="burger.jpg">
            <h3>Burger</h3>
            <p>₹120</p>
            <button>Add to Cart</button>
        </div>

        <div class="food-card">
            <img src="pizza.jpg">
            <h3>Pizza</h3>
            <p>₹250</p>
            <button>Add to Cart</button>
        </div>

        <div class="food-card">
            <img src="meal.jpg">
            <h3>Meals</h3>
            <p>₹180</p>
            <button>Add to Cart</button>
        </div>
    </div>
</section>

<!-- Footer -->
<footer>
    <p>© 2026 Foodie | All Rights Reserved</p>
</footer>

</body>
</html>
